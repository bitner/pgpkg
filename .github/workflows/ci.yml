name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra diff

      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Run ty
        run: uv run ty check src tests

  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra diff

      - name: Run unit tests
        run: uv run pytest tests/unit -q

  integration-build-docs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres-image: ["postgres:14-alpine", "postgres:15-alpine", "postgres:16-alpine", "postgres:17-alpine"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra diff

      - name: Run integration tests
        env:
          PGPKG_TEST_POSTGRES_IMAGE: ${{ matrix.postgres-image }}
        run: uv run pytest tests/integration -q

      - name: Build distributions
        run: uv build --out-dir dist

      - name: Check distributions
        run: uv run python -m twine check dist/*

      - name: Build docs
        env:
          PGPKG_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          PGPKG_SITE_URL: ""
        run: uv run mkdocs build --strict

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error
